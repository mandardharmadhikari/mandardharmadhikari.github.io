baseURL = "https://mandardharmadhikari.github.io/"
languageCode = "en"
title = "Mandar Dharmadhikari"
theme = "lightbi-hugo"
summaryLength  = "30"
metaDataFormat = "yaml"
pygmentsStyle = "trac"
pygmentsUseClasses = true
pygmentsCodeFences = true
pygmentsCodefencesGuessSyntax = true
pygmentsUseClassic = true
pygmentOptions = "linenos=inline"
#googleAnalytics = "XXX"
enableRobotsTXT = true
enableGitInfo = false
ignoreLogs = ['warning-goldmark-raw-html']


[Params]
selfHosted = true
mainSections = ["posts"]
dateFormat = "02 January 2006"
comments = false
readingTime = true
wordCount = true
hideAuthor = false
useHLJS = true
socialShare = true
delayDisqus = true
showRelatedPosts = true 
gcse = false
Lastmod = true
rss = true 
pagination = "10"
description="Writings from Mandar Dharmadhikari"
lunrSearch = true
previewCardImagePlacement = "bottom"
hidePostImage = false
tagSubtitle = "Various posts collected by tags"
seriesSubtitle = "Posts collected per series"
homepageLayout = "profile" #blog
profileWelcomeHeading = "Hi I'm Mandar Dharmadhikari"
